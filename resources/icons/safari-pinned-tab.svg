<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700">
  <!-- PDLOJ Safari Pinned Tab — single-color mask icon -->
  <!-- Rounded-square tile background -->
  <rect x="100" y="100" width="500" height="500" rx="150" fill="black"/>
  <!-- > chevron (filled polygon, equivalent to stroke-width 60 line) -->
  <!-- outer points: top-left, tip-right, bottom-left -->
  <polygon points="200,180 520,350 200,520 280,490 420,350 280,210" fill="white"/>
  <!-- _ cursor bar -->
  <rect x="500" y="460" width="100" height="60" rx="30" fill="white"/>
</svg>

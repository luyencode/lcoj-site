<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 202 80" width="202" height="80">
  <!--
    PDLOJ Logo — 202x80, transparent background
    Layout: [icon tile 56x56] | separator | [PDLOJ / subtitle text]
    Font: JetBrains Mono (imported from Google Fonts)
    Tight viewBox — content spans x=16..182, balanced 16px/20px padding
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- ─── Icon tile ──────────────────────────────────────────────
       56x56 tile, centered vertically in 80px canvas (top = 12).
       Icon content = exact 32x32 favicon design, scaled 1.75x
       via transform so both assets are pixel-identical in shape.
  ──────────────────────────────────────────────────────────────── -->
  <g transform="translate(16, 12)">

    <!-- Rounded-square tile -->
    <rect width="56" height="56" rx="12" fill="#0f172a"/>

    <!-- Scale the 32x32 icon design up to 56x56 (factor 1.75)  -->
    <!-- stroke-width 3 × 1.75 = 5.25 — proportionally correct  -->
    <g transform="scale(1.75)">

      <!-- > chevron (same coords as favicon) -->
      <polyline
        points="6,9 15,16 6,23"
        fill="none"
        stroke="#22c55e"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>

      <!-- _ cursor bar (same coords as favicon) -->
      <line
        x1="18" y1="22"
        x2="26" y2="22"
        stroke="#22c55e"
        stroke-width="3"
        stroke-linecap="round"/>

    </g>
  </g>

  <!-- ─── Vertical separator ────────────────────────────────────
       Sits 14px right of the tile (tile ends at x=72, sep at 86).
       Spans y=16..y=64 — leaves 16px breathing room top/bottom.
  ──────────────────────────────────────────────────────────────── -->
  <line
    x1="86" y1="16"
    x2="86" y2="64"
    stroke="#cbd5e1"
    stroke-width="1"/>

  <!-- ─── Text block ─────────────────────────────────────────────
       Starts at x=98 (12px after separator).
       Both lines left-aligned, vertically centered against the tile.
  ──────────────────────────────────────────────────────────────── -->

  <!-- Line 1: PDLOJ — large, bold -->
  <text
    x="98"
    y="44"
    font-family="'JetBrains Mono', monospace"
    font-size="28"
    font-weight="700"
    fill="#0f172a">PDLOJ</text>

  <!-- Line 2: school name only — small, muted, width-locked to match PDLOJ -->
  <!-- textLength="84" + lengthAdjust="spacing" stretches letter gaps     -->
  <!-- to exactly match the 84px width of "PDLOJ" at 28px above           -->
  <text
    x="98"
    y="61"
    font-family="'JetBrains Mono', monospace"
    font-size="11.5"
    font-weight="400"
    fill="#94a3b8"
    textLength="84"
    lengthAdjust="spacing">Phan Đăng Lưu</text>

</svg>
